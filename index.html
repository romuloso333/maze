<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Maze Codex . Probe v0.7</title>
<style>
  :root{
    --gold:#C9A46A;
    --gold2:#C8A95E;
    --gold-bright:#E0C084;
    --gold-25:rgba(201,164,106,.25);
    --gold-40:rgba(201,164,106,.40);
    --gold-12:rgba(201,164,106,.12);
    --parch:#E8DCC0;
    --parch-dim:#C9BFA6;
    --muted:#9AA0B4;
    --teal:#7FB0AB;
    --red:#C4736B;
    --green:#7FAF8C;
    --blue:#7B96C9;
    --hair:rgba(201,164,106,.28);
    --card:rgba(8,8,18,.42);
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px;
    --serif:Georgia,"Times New Roman",Times,serif;
  }

  /* per-tab tint colors, registered so they crossfade */
  @property --bg-a { syntax:'<color>'; inherits:true; initial-value:#0A0C22; }
  @property --bg-b { syntax:'<color>'; inherits:true; initial-value:#121740; }
  @property --bg-c { syntax:'<color>'; inherits:true; initial-value:#1A2050; }

  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--serif);
    --bg-a:#0A0C22; --bg-b:#121740; --bg-c:#1A2050;
    background:
      radial-gradient(120% 90% at 50% 0%, var(--bg-c) 0%, var(--bg-b) 45%, var(--bg-a) 100%);
    background-attachment:fixed;
    color:var(--parch);
    font-size:15px;
    line-height:1.55;
    min-height:100vh;
    padding-bottom:175px; /* clearance for fixed HUD */
    transition:--bg-a .9s ease, --bg-b .9s ease, --bg-c .9s ease;
  }
  body.tint-odyssey  {--bg-a:#0A0C22;--bg-b:#121740;--bg-c:#1A2050}
  body.tint-abilities{--bg-a:#0E0924;--bg-b:#1A1042;--bg-c:#241852}
  body.tint-score    {--bg-a:#06141A;--bg-b:#0C222B;--bg-c:#122E38}
  body.tint-crew     {--bg-a:#150E07;--bg-b:#20150B;--bg-c:#2A1D10}
  body.tint-cohort   {--bg-a:#04100A;--bg-b:#0A1F12;--bg-c:#102B1A}
  body.tint-cultists {--bg-a:#180608;--bg-b:#270C12;--bg-c:#331119}
  body.tint-loadouts {--bg-a:#110E0A;--bg-b:#1C1610;--bg-c:#251D14}
  body.tint-library  {--bg-a:#171006;--bg-b:#251B0C;--bg-c:#332614}
  @media (prefers-reduced-motion:reduce){
    body{transition:none}
  }

  .wrap{max-width:880px;margin:0 auto;padding:0 var(--s4)}
  @media (min-width:560px){ .wrap{padding:0 var(--s5)} }

  /* ---------- diamonds ---------- */
  .dia{
    display:inline-block;width:7px;height:7px;
    transform:rotate(45deg);
    background:var(--gold);
    flex:none;
  }
  .dia.dim{background:transparent;border:1px solid var(--gold-40)}
  .dia.faint{background:transparent;border:1px solid var(--gold-25)}
  .dia.red{background:var(--red)}
  .dia.green{background:var(--green)}
  .dia.blue{background:var(--blue)}

  /* rung rows: full / half / empty diamonds */
  .rr{display:inline-flex;gap:7px;align-items:center;height:12px}
  .rr i{
    display:inline-block;width:8px;height:8px;flex:none;
    transform:rotate(45deg);
    border:1px solid var(--acc-dim,var(--gold-40));
  }
  .rr i.f{background:var(--acc,var(--gold));border-color:var(--acc,var(--gold))}
  .rr i.h{
    background:linear-gradient(135deg,var(--acc,var(--gold)) 50%,transparent 50%);
    border-color:var(--acc,var(--gold));
  }
  .acc-red  {--acc:#C4736B;--acc-dim:rgba(196,115,107,.45)}
  .acc-green{--acc:#7FAF8C;--acc-dim:rgba(127,175,140,.45)}
  .acc-blue {--acc:#7B96C9;--acc-dim:rgba(123,150,201,.45)}

  /* ---------- header ---------- */
  header{padding-top:var(--s6);text-align:center}
  .eyebrow{
    color:var(--gold);font-size:11px;letter-spacing:5px;text-transform:uppercase;
    display:flex;align-items:center;justify-content:center;gap:var(--s3);
  }
  .eyebrow::before,.eyebrow::after{
    content:"";height:1px;width:36px;
    background:linear-gradient(90deg,transparent,var(--hair));
  }
  .eyebrow::after{background:linear-gradient(90deg,var(--hair),transparent)}
  h1{
    margin-top:var(--s3);
    font-size:26px;font-weight:normal;letter-spacing:6px;text-transform:uppercase;
    color:var(--parch);
  }
  h1 .ver{color:var(--gold);font-size:15px;letter-spacing:3px;vertical-align:middle}
  .chip{
    display:inline-block;margin-top:var(--s4);
    border:1px solid var(--gold-40);
    padding:5px 14px;
    font-size:10px;letter-spacing:2px;color:var(--parch-dim);
  }
  .chip b{color:var(--gold);font-weight:normal;letter-spacing:3px}

  .draft{
    display:inline-block;
    font-size:8.5px;letter-spacing:2px;text-transform:uppercase;
    border:1px dashed rgba(224,192,132,.55);color:var(--gold-bright);
    padding:2px 8px;white-space:nowrap;vertical-align:2px;
  }

  /* ---------- tabs ---------- */
  .tabs{
    margin-top:var(--s6);
    display:flex;justify-content:center;gap:0;flex-wrap:wrap;
    border-bottom:1px solid rgba(201,164,106,.18);
  }
  .tab{
    appearance:none;background:none;border:none;cursor:pointer;
    font-family:var(--serif);
    color:var(--muted);
    font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
    padding:var(--s3) 10px 13px;
    position:relative;
  }
  @media (min-width:640px){ .tab{font-size:12px;letter-spacing:4px;padding:var(--s3) var(--s4) 14px} }
  @media (min-width:880px){ .tab{font-size:13px;letter-spacing:5px;padding:var(--s3) 22px 14px} }
  .tab::after{
    content:"";position:absolute;left:12%;right:12%;bottom:-1px;height:2px;
    background:transparent;transition:background .25s ease;
  }
  .tab[aria-selected="true"]{color:var(--gold-bright)}
  .tab[aria-selected="true"]::after{background:var(--gold)}
  .tab:hover{color:var(--parch)}
  .tab:focus-visible{outline:1px solid var(--gold);outline-offset:3px}
  @media (prefers-reduced-motion:reduce){ .tab::after{transition:none} }

  .panels{min-height:460px;padding-top:var(--s6)}
  [role="tabpanel"][hidden]{display:none}
  [role="tabpanel"]:focus{outline:none}

  /* ---------- section headings ---------- */
  .sect{
    display:flex;align-items:center;gap:var(--s3);
    margin:var(--s7) 0 var(--s5);
    color:var(--gold);font-size:11px;letter-spacing:4px;text-transform:uppercase;
  }
  .sect:first-child{margin-top:0}
  .sect .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--hair),transparent)}
  .sect small{color:var(--muted);font-size:9.5px;letter-spacing:2px;text-transform:none;font-style:italic}

  /* ---------- character block ---------- */
  .char{text-align:center}
  .char .name{font-size:22px;letter-spacing:5px;text-transform:uppercase;color:var(--parch)}
  .char .name small{font-size:13px;letter-spacing:2px;color:var(--muted);text-transform:none}
  .char .lane{margin-top:var(--s2);color:var(--parch-dim);font-size:14px;letter-spacing:1px}
  .char .phase{
    margin-top:var(--s2);color:var(--gold);font-size:11px;letter-spacing:3px;text-transform:uppercase;
    display:flex;align-items:center;justify-content:center;gap:var(--s2);
  }
  .pflag{margin:var(--s6) auto 0;max-width:560px}
  .pflag .pflag-label{
    color:var(--gold);font-size:9.5px;letter-spacing:3px;text-transform:uppercase;
    display:flex;align-items:center;justify-content:center;gap:var(--s2);
  }
  .pflag .pflag-text{
    margin-top:var(--s3);
    font-style:italic;color:var(--gold-bright);font-size:21px;line-height:1.45;
    text-shadow:0 0 22px rgba(224,192,132,.28);
  }
  .pflag .pflag-tag{
    display:inline-block;margin-top:var(--s3);
    font-size:8.5px;letter-spacing:2px;text-transform:uppercase;
    border:1px solid var(--gold-40);color:var(--gold);padding:2px 8px;
  }
  .subflags{margin-top:var(--s5)}
  .subflag{
    color:var(--parch-dim);font-size:13.5px;font-style:italic;
    max-width:520px;margin:var(--s4) auto 0;opacity:.85;
  }
  .subflag .sf-label{
    display:block;font-style:normal;
    font-size:8.5px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--muted);margin-bottom:3px;
  }

  /* ---------- quests ---------- */
  .quest{padding:var(--s4) 0 var(--s5);border-bottom:1px solid rgba(201,164,106,.14)}
  .quest:last-child{border-bottom:none}
  .q-head{display:flex;align-items:baseline;gap:var(--s3);flex-wrap:wrap}
  .q-head .dia{transform:rotate(45deg) translateY(-1px)}
  .q-name{color:var(--gold-bright);font-size:16px;letter-spacing:1.5px}
  .q-tags{display:flex;gap:var(--s2);flex-wrap:wrap}
  .tag{
    font-size:9px;letter-spacing:2px;text-transform:uppercase;
    border:1px solid var(--gold-40);color:var(--gold);
    padding:2px 8px;white-space:nowrap;
  }
  .tag.urgent{border-color:rgba(224,192,132,.7);color:var(--gold-bright)}
  .tag.fire{border-color:rgba(224,170,110,.75);color:#E7B27A}
  .tag.blown{border-color:rgba(205,105,95,.75);color:#DB8B80}
  .q-body{margin-top:var(--s2);padding-left:19px;color:var(--parch-dim);font-size:14px}
  .q-body .line{margin-top:var(--s1)}
  .q-note{margin-top:var(--s2);font-size:12.5px;font-style:italic;color:var(--muted)}
  .q-reward{margin-top:var(--s2);font-size:12.5px;color:var(--muted)}
  .q-reward b{color:var(--gold);font-weight:normal}

  .qbar{margin-top:var(--s3);max-width:420px}
  .qbar .track{
    height:5px;background:rgba(232,220,192,.08);
    border:1px solid rgba(201,164,106,.22);position:relative;
  }
  .qbar .fill{position:absolute;left:0;top:0;bottom:0;background:var(--gold)}
  .qbar .qbar-label{margin-top:5px;font-size:11px;letter-spacing:1px;color:var(--muted)}

  .ticks{margin-top:var(--s3);display:grid;gap:6px;max-width:460px}
  .tick{display:flex;align-items:center;gap:var(--s3);font-size:13.5px}
  .tick .dia{width:6px;height:6px}
  .tick .t-name{color:var(--parch)}
  .tick .t-state{margin-left:auto;font-size:10px;letter-spacing:2px;text-transform:uppercase}
  .tick .t-state.live{color:var(--teal)}
  .tick .t-state.owed{color:var(--muted)}
  .tick .t-sub{font-size:11px;color:var(--muted);font-style:italic}

  /* ---------- maze bank : coin piles ---------- */
  .piles{display:flex;flex-wrap:wrap;gap:12px 6px;justify-content:center;align-items:flex-end}
  .pile{display:flex;flex-direction:column;align-items:center;width:70px;text-align:center}
  .pile svg{display:block}
  .pile text{font-family:var(--serif)}
  .pile-name{margin-top:2px;font-variant:small-caps;letter-spacing:1.5px;color:var(--parch);font-size:12px}
  .pile-dom{font-variant:small-caps;letter-spacing:1px;color:var(--muted);font-size:10px;line-height:1.35}
  .bank-note{margin-top:var(--s4);text-align:center;font-size:11.5px;font-style:italic;color:var(--muted)}
  .bank-caps{
    margin-top:var(--s3);text-align:center;
    font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--parch-dim);
  }

  /* ---------- bounties ---------- */
  .bounties{display:grid;gap:var(--s3)}
  @media (min-width:560px){ .bounties{grid-template-columns:1fr 1fr} }
  .bounty{
    border:1px solid var(--gold-25);background:var(--card);
    padding:10px 13px;display:flex;gap:10px;align-items:baseline;
  }
  .bounty .dia{width:6px;height:6px;transform:rotate(45deg) translateY(-1px)}
  .bounty .b-name{color:var(--gold-bright);font-size:13px;letter-spacing:1.5px}
  .bounty .b-line{display:block;color:var(--parch-dim);font-size:12px;margin-top:2px}

  /* ---------- abilities: spear + season ---------- */
  .badge-row{text-align:center;margin-bottom:var(--s4)}
  .spear{
    border:1px solid var(--gold-40);background:var(--card);
    max-width:640px;margin:0 auto;padding:var(--s4) var(--s5);
    display:flex;gap:var(--s4);align-items:center;
  }
  .spear svg{flex:none}
  .spear .sp-label{color:var(--gold);font-size:9.5px;letter-spacing:3px;text-transform:uppercase}
  .spear .sp-title{color:var(--parch);font-size:16px;font-style:italic;margin-top:2px}
  .spear .sp-line{color:var(--muted);font-size:9.5px;letter-spacing:1.8px;text-transform:uppercase;margin-top:6px;line-height:1.7}
  .season-strip{
    margin:var(--s5) auto 0;max-width:640px;text-align:center;
    border-top:1px solid var(--gold-12);border-bottom:1px solid var(--gold-12);
    padding:var(--s2) var(--s3);
    color:var(--parch-dim);font-size:9.5px;letter-spacing:2px;text-transform:uppercase;line-height:1.9;
  }

  /* ---------- abilities: forest ---------- */
  .chips{display:flex;gap:var(--s2);flex-wrap:wrap;justify-content:center;margin:var(--s6) 0 var(--s5)}
  .chipbtn{
    appearance:none;cursor:pointer;background:none;font-family:var(--serif);
    border:1px solid var(--gold-25);color:var(--parch-dim);
    padding:8px 13px;display:flex;align-items:center;gap:9px;
    font-size:11px;letter-spacing:2px;text-transform:uppercase;
  }
  .chipbtn small{font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:none}
  .chipbtn[aria-pressed="true"]{
    border-color:var(--gold);color:var(--gold-bright);background:rgba(201,164,106,.07);
  }
  .chipbtn:focus-visible{outline:1px solid var(--gold);outline-offset:2px}

  .forest{display:grid;gap:var(--s7);margin-top:var(--s5)}
  @media (max-width:979.98px){
    .forest .tree:not(.active){display:none}
  }
  @media (min-width:980px){
    .chips{display:none}
    .forest{grid-template-columns:repeat(3,1fr);gap:var(--s5)}
  }

  .tree-head{
    display:flex;align-items:center;justify-content:center;gap:var(--s2);
    margin-bottom:var(--s2);
  }
  .tree-head .t-name{color:var(--gold);font-size:12px;letter-spacing:4px;text-transform:uppercase}
  .tree-count{text-align:center;color:var(--muted);font-size:9.5px;letter-spacing:2px;text-transform:uppercase;margin-bottom:var(--s4)}

  .tgrove{position:relative;padding:6px 0 2px}
  .tgrove::before{ /* the trunk */
    content:"";position:absolute;left:50%;top:0;bottom:0;width:1px;
    background:linear-gradient(180deg,var(--acc-dim,var(--gold-25)),rgba(201,164,106,.08));
  }
  .bcard{
    position:relative;width:86%;
    border:1px solid rgba(201,164,106,.22);background:rgba(8,8,18,.55);
    padding:10px 13px;margin-bottom:13px;
  }
  .bcard.L{margin-right:auto}
  .bcard.R{margin-left:auto}
  .bcard .b-top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .bcard .b-name{color:var(--parch);font-size:14px;letter-spacing:.5px}
  .bcard .b-epi{
    display:block;margin-top:1px;
    font-variant:small-caps;letter-spacing:1.5px;
    color:var(--gold);opacity:.85;font-size:11.5px;
  }
  .bcard .b-row{display:flex;align-items:center;gap:10px;margin-top:7px;flex-wrap:wrap}
  .bcard .b-pos{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
  .bcard .b-note{margin-top:5px;font-size:11.5px;font-style:italic;color:var(--muted)}

  .bcard.nextcard{
    width:92%;margin:2px auto 0;text-align:center;
    border-color:rgba(224,192,132,.55);
  }
  .nextcard .n-dia{
    display:inline-block;width:9px;height:9px;transform:rotate(45deg);
    background:transparent;border:1px solid var(--gold-bright);
    box-shadow:0 0 8px 2px rgba(224,192,132,.35);
    animation:pulse 2.4s ease-in-out infinite;
    margin-bottom:6px;
  }
  .nextcard .b-name{color:var(--gold-bright)}
  .next-tag{
    font-size:8.5px;letter-spacing:2px;color:var(--gold-bright);
    border:1px solid rgba(224,192,132,.5);padding:1px 6px;margin-left:8px;
    text-transform:uppercase;vertical-align:2px;white-space:nowrap;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 4px 1px rgba(224,192,132,.20)}
    50%{box-shadow:0 0 12px 4px rgba(224,192,132,.45)}
  }
  @media (prefers-reduced-motion:reduce){
    .nextcard .n-dia{animation:none;box-shadow:0 0 8px 2px rgba(224,192,132,.35)}
  }

  /* ---------- score ---------- */
  .score-head{text-align:center}
  .score-head .sh-title{font-size:20px;letter-spacing:5px;text-transform:uppercase;color:var(--parch)}
  .score-head .sh-sub{margin-top:var(--s2);color:var(--gold);font-style:italic;font-size:15px}
  .score-head .sh-desc{margin:var(--s3) auto 0;max-width:540px;color:var(--muted);font-size:13px;font-style:italic}
  .worlds{display:grid;gap:var(--s4);margin-top:var(--s6)}
  @media (min-width:760px){
    .worlds{grid-template-columns:1fr 1fr}
    .worlds .world:last-child{grid-column:1/-1;max-width:60%;margin:0 auto;width:100%}
  }
  .world{
    border:1px solid var(--gold-25);background:var(--card);
    padding:var(--s4) var(--s4) var(--s4) var(--s4);
    display:flex;gap:var(--s4);
  }
  .w-letter{
    flex:none;width:44px;height:44px;transform:rotate(45deg);margin:6px 8px 0 4px;
    border:1px solid var(--gold-40);display:flex;align-items:center;justify-content:center;
  }
  .w-letter span{transform:rotate(-45deg);color:var(--gold-bright);font-size:20px}
  .w-body{min-width:0}
  .w-name{color:var(--parch);font-size:15px;letter-spacing:3px;text-transform:uppercase}
  .w-renamed{font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-left:8px}
  .w-lineage{
    margin-top:2px;font-variant:small-caps;letter-spacing:1.2px;
    color:var(--gold);opacity:.8;font-size:11.5px;
  }
  .ladder{display:flex;gap:18px;margin-top:var(--s3);align-items:flex-start}
  .lstep{text-align:center;width:40px}
  .lstep .rr{height:10px}
  .lstep b{
    display:block;font-weight:normal;font-size:7.5px;letter-spacing:1.2px;
    text-transform:uppercase;color:var(--muted);margin-top:6px;
  }
  .l-label{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--parch-dim);margin-top:6px}
  .w-status{margin-top:var(--s2);font-size:12.5px;font-style:italic;color:var(--parch-dim)}
  .score-doctrine{margin-top:var(--s4);text-align:center;color:var(--muted);font-size:11px;font-style:italic;letter-spacing:.5px}

  /* ---------- crew ---------- */
  .crew{display:grid;gap:var(--s3)}
  @media (min-width:560px){ .crew{grid-template-columns:1fr 1fr} }
  .cnode{
    display:flex;gap:var(--s3);align-items:baseline;
    border:1px solid rgba(201,164,106,.18);background:var(--card);
    padding:9px 13px;
  }
  .cnode .dia{width:6px;height:6px;transform:rotate(45deg) translateY(-1px)}
  .cnode .c-name{color:var(--gold-bright);font-size:13px;letter-spacing:2px;text-transform:uppercase}
  .cnode .c-role{color:var(--parch);font-size:12.5px}
  .cnode .c-standing{display:block;color:var(--parch-dim);font-size:11.5px;font-style:italic;margin-top:1px}
  .cnode .c-voice{
    display:block;margin-top:2px;
    font-variant:small-caps;letter-spacing:1.5px;color:var(--muted);font-size:10.5px;
  }
  .cnode.faded{opacity:.4}

  /* ---------- cultists ---------- */
  .cult-head{
    text-align:center;
    font-variant:small-caps;letter-spacing:4px;color:var(--gold);font-size:13px;
  }
  .cult-title{text-align:center;font-size:21px;letter-spacing:1px;color:var(--parch);margin-top:var(--s2);font-style:italic}
  .cult-law{
    margin-top:var(--s3);text-align:center;
    color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;line-height:1.9;
  }
  .cult-status{
    margin:var(--s5) auto 0;max-width:520px;
    border:1px solid rgba(201,164,106,.30);
    padding:var(--s2) var(--s3);text-align:center;
    color:var(--parch-dim);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
  }

  /* ---------------- Tab 6 . Cultists ---------------- */
  function hoodGlyph(x, y, s, opts){
    /* a simple hooded-figure arch: rounded hood, flat hem */
    var g = hs("g",null);
    var st = opts.stroke, so = opts.strokeOp, fill = opts.fill, fo = opts.fillOp;
    g.appendChild(hs("path",{
      d:"M "+(x-9*s)+" "+(y+7*s)+
        " L "+(x-9*s)+" "+(y+1*s)+
        " Q "+(x-9*s)+" "+(y-9*s)+" "+x+" "+(y-9*s)+
        " Q "+(x+9*s)+" "+(y-9*s)+" "+(x+9*s)+" "+(y+1*s)+
        " L "+(x+9*s)+" "+(y+7*s)+" Z",
      fill:fill,"fill-opacity":fo,stroke:st,"stroke-opacity":so,"stroke-width":opts.w||1.1}));
    /* the veil: an empty arc where the face would be */
    g.appendChild(hs("path",{
      d:"M "+(x-4.5*s)+" "+(y+2*s)+" Q "+x+" "+(y-3.5*s)+" "+(x+4.5*s)+" "+(y+2*s),
      fill:"none",stroke:st,"stroke-opacity":Math.min(1,so+0.15),"stroke-width":1}));
    return g;
  }
  function renderCultists(root){
    var d = DATA.cultists;

    root.appendChild(h("p",{class:"cult-status"}, d.status));

    var W = 480, H = 446, cx = 240, cy = 196;
    var litNames = d.ring.filter(function(n){return n.lit;}).map(function(n){return n.name;}).join(", ");
    var svg = hs("svg",{class:"web",viewBox:"0 0 "+W+" "+H,role:"img",
      "aria-label":"The web of the Flame. Center: a large masked hooded figure, "+d.center.name+", the "+d.center.sub+
      ". Around it: "+d.ring.map(function(n){return n.name;}).join(", ")+
      ", with "+d.unknown+" unknown masked nodes on the upper spokes. Lit wires: "+litNames+"."});

    var defs = hs("defs",null);
    var grad = hs("radialGradient",{id:"glowG"});
    grad.appendChild(hs("stop",{offset:"0%","stop-color":"#E0C084","stop-opacity":"0.34"}));
    grad.appendChild(hs("stop",{offset:"100%","stop-color":"#E0C084","stop-opacity":"0"}));
    defs.appendChild(grad);
    svg.appendChild(defs);

    var ringPos = [
      {x: 66, y:170}, /* OCEAN */
      {x: 92, y:298}, /* JEWELL */
      {x:178, y:352}, /* VARET SESSIONS */
      {x:302, y:352}, /* GILLIAN */
      {x:388, y:298}, /* SHOVAL */
      {x:414, y:170}  /* XEHRA */
    ];
    var unkPos = [{x:146,y:74},{x:240,y:48},{x:334,y:74}];

    function spoke(px, py, lit){
      var dx = px-cx, dy = py-cy, len = Math.sqrt(dx*dx+dy*dy);
      var ux = dx/len, uy = dy/len;
      var x1 = cx+ux*40, y1 = cy+uy*40, x2 = px-ux*20, y2 = py-uy*20;
      svg.appendChild(hs("line",{x1:x1,y1:y1,x2:x2,y2:y2,
        stroke:"#E8DCC0","stroke-opacity": lit? "0.55":"0.16","stroke-width": lit? "1.4":"1"}));
    }

    /* spokes first (under the nodes) */
    d.ring.forEach(function(n,i){ spoke(ringPos[i].x, ringPos[i].y, !!n.lit); });
    unkPos.forEach(function(p){ spoke(p.x, p.y, false); });

    /* unknown masked nodes */
    unkPos.forEach(function(p){
      svg.appendChild(hoodGlyph(p.x, p.y, 1, {stroke:"#E8DCC0",strokeOp:0.30,fill:"#E8DCC0",fillOp:0.03}));
      svg.appendChild(hs("text",{x:p.x,y:p.y+24,"text-anchor":"middle",
        "font-size":"9","letter-spacing":"2",fill:"#9AA0B4"},"??"));
    });

    /* ring nodes */
    d.ring.forEach(function(n,i){
      var p = ringPos[i];
      if (n.lit) svg.appendChild(hs("circle",{cx:p.x,cy:p.y,r:24,fill:"url(#glowG)"}));
      svg.appendChild(hoodGlyph(p.x, p.y, 1.05, n.lit
        ? {stroke:"#E0C084",strokeOp:0.95,fill:"#E0C084",fillOp:0.16,w:1.3}
        : {stroke:"#E8DCC0",strokeOp:0.55,fill:"#E8DCC0",fillOp:0.06}));
      svg.appendChild(hs("text",{x:p.x,y:p.y+26,"text-anchor":"middle",
        "font-size":"10","letter-spacing":"2",fill: n.lit ? "#E0C084":"#E8DCC0"}, n.name));
      if (n.tag) svg.appendChild(hs("text",{x:p.x,y:p.y+39,"text-anchor":"middle",
        "font-size":"8","font-style":"italic",fill:"#9AA0B4"}, n.tag));
    });

    /* center: the Sage */
    svg.appendChild(hs("circle",{cx:cx,cy:cy,r:52,fill:"url(#glowG)"}));
    svg.appendChild(hoodGlyph(cx, cy, 2.7, {stroke:"#E0C084",strokeOp:0.9,fill:"#2A0D12",fillOp:0.9,w:1.6}));
    svg.appendChild(hs("path",{d:"M "+cx+" "+(cy+2)+" L "+(cx+5)+" "+(cy+7)+" L "+cx+" "+(cy+12)+" L "+(cx-5)+" "+(cy+7)+" Z",
      fill:"#E0C084","fill-opacity":"0.85"}));
    svg.appendChild(hs("text",{x:cx,y:cy-34,"text-anchor":"middle",
      "font-size":"8","letter-spacing":"2.5",fill:"#9AA0B4"},"MASKED"));
    svg.appendChild(hs("text",{x:cx,y:cy+42,"text-anchor":"middle",
      "font-size":"15","letter-spacing":"4",fill:"#E0C084"}, d.center.name));
    svg.appendChild(hs("text",{x:cx,y:cy+58,"text-anchor":"middle",
      "font-size":"9","letter-spacing":"2",fill:"#9AA0B4"}, d.center.sub.toUpperCase()));

    root.appendChild(svg);

    root.appendChild(h("div",{class:"law"},
      h("b",null,d.plaque.title), d.plaque.line));
  }

      return h("div",{class:"truth"}, t);
    })));

    root.appendChild(sect("Loop Returns", d.loopReturns.mark));
    root.appendChild(h("div",{class:"loops"}, d.loopReturns.items.map(function(it){
      return h("p",{class:"loopline"}, dia("dim"),
        h("span",null, h("b",null,it.name), " . "+it.line));
    })));

    root.appendChild(sect("Links of the Maze","open in new tabs"));
    root.appendChild(h("div",{class:"links"}, d.links.items.map(function(l){
      return h("a",{class:"mlink",href:l.url,target:"_blank",rel:"noopener"}, dia("dim"), l.name);
    })));
    root.appendChild(h("p",{class:"links-foot"}, d.links.foot));
  }

  /* ---------------- mount + tabs ---------------- */
  var mounts = {
    "panel-odyssey": renderOdyssey,
    "panel-abilities": renderAbilities,
    "panel-score": renderScore,
    "panel-cohort": renderCohort,
    "panel-crew": renderCrew,
    "panel-cultists": renderCultists,
    "panel-loadouts": renderLoadouts,
    "panel-library": renderLibrary
  };
  for (var id in mounts) mounts[id](document.getElementById(id));

  var tints = {
    "tab-odyssey":"tint-odyssey",
    "tab-abilities":"tint-abilities",
    "tab-score":"tint-score",
    "tab-cohort":"tint-cohort",
    "tab-crew":"tint-crew",
    "tab-cultists":"tint-cultists",
    "tab-loadouts":"tint-loadouts",
    "tab-library":"tint-library"
  };
  var tabs = Array.prototype.slice.call(document.querySelectorAll('[role="tab"]'));
  var panels = tabs.map(function(t){ return document.getElementById(t.getAttribute("aria-controls")); });

  function select(i, focus){
    tabs.forEach(function(t, j){
      var on = j === i;
      t.setAttribute("aria-selected", on ? "true" : "false");
      t.tabIndex = on ? 0 : -1;
      panels[j].hidden = !on;
    });
    document.body.className = tints[tabs[i].id];
    if (focus) tabs[i].focus();
  }

  tabs.forEach(function(t, i){
    t.addEventListener("click", function(){ select(i, false); });
    t.addEventListener("keydown", function(e){
      var n = null;
      if (e.key === "ArrowRight") n = (i + 1) % tabs.length;
      else if (e.key === "ArrowLeft") n = (i - 1 + tabs.length) % tabs.length;
      else if (e.key === "Home") n = 0;
      else if (e.key === "End") n = tabs.length - 1;
      if (n !== null){ e.preventDefault(); select(n, true); }
    });
  });
})();
</script>

</body>
</html>
